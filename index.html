<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GLSL Patterns</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      overflow: hidden;
      font-family: 'SF Mono', 'Fira Code', monospace;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }

    /* HUD overlay */
    #hud {
      position: fixed;
      top: 0; left: 0; right: 0;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      background: linear-gradient(to bottom, rgba(0,0,0,0.6), transparent);
      pointer-events: none;
      z-index: 10;
    }

    #nav {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      pointer-events: all;
    }

    .pill {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.6);
      padding: 5px 13px;
      border-radius: 20px;
      font-size: 11px;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.02em;
    }
    .pill:hover  { background: rgba(255,255,255,0.16); color: #fff; }
    .pill.active { background: rgba(255,255,255,0.22); color: #fff; border-color: rgba(255,255,255,0.4); }

    .pill.video-pill { border-color: rgba(80,200,255,0.25); color: rgba(80,200,255,0.7); }
    .pill.video-pill:hover  { background: rgba(80,200,255,0.14); color: #6df; }
    .pill.video-pill.active { background: rgba(80,200,255,0.22); color: #6df; border-color: rgba(80,200,255,0.55); }

    #video-upload {
      display: flex;
      align-items: center;
      gap: 8px;
      pointer-events: all;
      margin-left: 6px;
      padding-left: 12px;
      border-left: 1px solid rgba(255,255,255,0.1);
    }

    #video-upload label {
      background: rgba(80,200,255,0.08);
      border: 1px solid rgba(80,200,255,0.3);
      color: rgba(80,200,255,0.8);
      padding: 5px 13px;
      border-radius: 20px;
      font-size: 11px;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.02em;
      white-space: nowrap;
    }
    #video-upload label:hover { background: rgba(80,200,255,0.18); color: #6df; }

    #video-label {
      font-size: 10px;
      color: rgba(80,200,255,0.35);
      letter-spacing: 0.04em;
      max-width: 180px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #desc {
      font-size: 10px;
      color: rgba(255,255,255,0.35);
      margin-left: 4px;
      letter-spacing: 0.04em;
      pointer-events: none;
    }

    #hint {
      position: fixed;
      bottom: 14px;
      right: 18px;
      font-size: 10px;
      color: rgba(255,255,255,0.2);
      letter-spacing: 0.06em;
      z-index: 10;
    }

    #error {
      display: none;
      position: fixed;
      bottom: 40px;
      left: 20px;
      right: 20px;
      background: rgba(200,30,30,0.85);
      color: #fff;
      padding: 12px 16px;
      border-radius: 6px;
      font-size: 11px;
      white-space: pre-wrap;
      z-index: 20;
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>

  <div id="hud">
    <div id="nav"></div>
    <span id="desc"></span>
    <div id="video-upload">
      <label for="video-input">⬆ Upload Video</label>
      <input id="video-input" type="file" accept="video/*" style="display:none">
      <span id="video-label">no video loaded</span>
    </div>
  </div>

  <div id="hint">← → to cycle</div>
  <div id="error"></div>

  <script type="module" src="src/app.js"></script>
</body>
</html>
